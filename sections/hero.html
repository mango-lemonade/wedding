<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero — Spencer & Jenna 2027</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../styles.css">

  <style>
    /* ── Hero (section-specific) ── */
    .hero {
      background: var(--green-dark);
      color: var(--cream);
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 5rem 1.5rem;
    }

    .hero-eyebrow {
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeInUp 1s ease-out 0.5s forwards;
    }

    .hero-names {
      font-size: clamp(3rem, 10vw, 6.5rem);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 1.75rem;
      opacity: 0;
      animation: fadeInUp 1s ease-out 0.7s forwards;
    }

    .hero-names .ampersand {
      color: var(--lime);
    }

    .hero-tagline {
      font-size: clamp(1.125rem, 3vw, 1.5rem);
      font-weight: 300;
      font-style: italic;
      opacity: 0;
      margin-bottom: 3rem;
      animation: fadeInUp 1s ease-out 0.9s forwards;
    }

    .hero-details {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 1rem 3rem;
      opacity: 0;
      animation: fadeInUp 1s ease-out 1.1s forwards;
    }

    .detail {
      text-align: center;
      position: relative;
    }

    .detail-label {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 0.375rem;
    }

    .detail-value {
      font-size: 1.0625rem;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .detail:not(:last-child)::after {
      content: '';
      position: absolute;
      right: -1.5rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 2.5rem;
      background: var(--cream);
      opacity: 0.15;
    }

    @media (max-width: 640px) {
      .hero-content {
        padding: 4rem 1.5rem;
      }

      .hero-details {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .detail:not(:last-child)::after {
        display: none;
      }

      .detail:not(:last-child) {
        padding-bottom: 1.5rem;
        border-bottom: 1px solid rgba(251, 251, 251, 0.1);
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="back-banner">
      <a href="https://spencerandjenna.com">back to spencerandjenna.com</a>
    </div>

    <div class="hero-content">
      <p class="hero-eyebrow">Please Join Us</p>

      <h1 class="hero-names">Spencer <span class="ampersand">&amp;</span> Jenna</h1>
      <p class="hero-tagline">are getting married</p>

      <div class="hero-details">
        <div class="detail">
          <p class="detail-label">Ceremony</p>
          <p class="detail-value">Saturday, May 29</p>
        </div>
        <div class="detail">
          <p class="detail-label">Location</p>
          <p class="detail-value">Big Sur</p>
        </div>
        <div class="detail">
          <p class="detail-label">Festivities</p>
          <p class="detail-value">May 28 – May 31</p>
        </div>
      </div>
    </div>
  </section>

  <div class="nav-section">
    <nav class="nav">
      <a href="#overview">Overview</a>
      <a href="#weekend">Weekend</a>
      <a href="#lodging">Lodging</a>
      <a href="#shuttles">Shuttles</a>
      <a href="#questions">Questions</a>
    </nav>
  </div>

</body>
</html>
